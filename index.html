<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatFinder</title>
<meta name="description" content="CatFinder — encuentra gatos cerca de ti. Muy pronto en Google Play y App Store.">
<style>
  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0;
    height: 100%;
    background: #ffffff;
  }

  body{
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .hero{
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }

  .hero img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .badges{
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.9rem;
    padding: 1.5rem 1rem 2.2rem;
  }

  .badges-row{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    flex-wrap: wrap;
  }

  .badges-row a{
    display: block;
    line-height: 0;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .badges-row a:hover{
    transform: translateY(-2px);
    opacity: 0.85;
  }

  .badges-row img{
    height: 44px;
    width: auto;
    display: block;
  }

  .coming-soon{
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #b5591f;
    background: #fdece0;
    border: 1px solid #f6d3b4;
    padding: 0.3rem 0.9rem;
    border-radius: 20px;
    margin: 0;
  }

  @media (min-width: 860px){
    .badges-row img{ height: 52px; }
    .badges{ padding-bottom: 3rem; gap: 1.1rem; }
  }
</style>
</head>
<body>

  <div class="hero">
    <img src="logo.jpg" alt="CatFinder">
  </div>

  <div class="badges">
    <div class="badges-row">
      <a href="https://play.google.com/store" target="_blank" rel="noopener" aria-label="Disponible próximamente en Google Play">
        <img src="google-play-badge.png" alt="Disponible en Google Play">
      </a>
      <a href="https://apps.apple.com/" target="_blank" rel="noopener" aria-label="Disponible próximamente en App Store">
        <img src="app-store-badge.svg" alt="Disponible en App Store">
      </a>
    </div>
    <p class="coming-soon">Próximamente</p>
  </div>

</body>
</html>
